include:
  # Peripheral halves (via Bluetooth to dongle)
  - board: xiao_ble//zmk
    shield: totem_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  - board: xiao_ble//zmk
    shield: totem_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  # AdeptBLE trackball (via Bluetooth to dongle, split peripheral)
  - board: xiao_ble//zmk
    shield: AdeptBLE
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: adept_ble_peripheral

  # Dongle (nice!nano acts as central/USB host)
  - board: nice_nano//zmk
    shield: totem_central
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: totem_central

  # Settings reset firmware
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: nice_nano_settings_reset

  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: xiao_ble_settings_reset
