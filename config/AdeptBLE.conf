CONFIG_ZMK_KEYBOARD_NAME="AdeptBLE"

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_GPIO=y

# PMW3610 Driver (via badjeff/zmk-pmw3610-driver module)
CONFIG_PINCTRL=y
CONFIG_PMW3610_ALT=y
# Extra power-up delay: xiao_ble needs time for VCC regulator to stabilize
# before sensor init (prevents "Incorrect product id 0xFF" error)
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# Split peripheral mode (connects to dongle as central)
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_USB=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y

CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=2
