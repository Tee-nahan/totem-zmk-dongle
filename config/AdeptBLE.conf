CONFIG_ZMK_KEYBOARD_NAME="AdeptBLE"

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_GPIO=y

# PMW3610 Driver (Zephyr 4.1 built-in)
CONFIG_PINCTRL=y
CONFIG_PMW3610=y

# Split peripheral mode (connects to dongle as central)
CONFIG_ZMK_SPLIT=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=y

CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=2
