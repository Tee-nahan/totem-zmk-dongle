# enable zmk studio for realtime keymap updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_MOUSE=y

# Pointing support for trackball peripheral
CONFIG_ZMK_POINTING=y

# 3 peripherals: totem_left + totem_right + AdeptBLE trackball
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
