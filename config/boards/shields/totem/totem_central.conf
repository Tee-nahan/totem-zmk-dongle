# Dongle (central) configuration
# Split BLE: 3 peripherals (left + right + AdeptBLE trackball)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3

# Fetch battery levels from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Display
CONFIG_ZMK_DISPLAY=y

# Trackball (pointing forwarding from AdeptBLE peripheral)
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Battery: report battery level via BLE (for ZMK Center)
CONFIG_BT_BAS=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# (Optional) Show dongle battery level on display
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=n

# Disable layer name widget entirely
CONFIG_ZMK_DONGLE_DISPLAY_LAYER=n

# Dongle is USB-powered, never sleep
CONFIG_ZMK_SLEEP=n

# Enable BLE output to host computer (wireless connection)
CONFIG_ZMK_BLE=y

# BT connections: 2 split peripherals + 5 BLE host profiles
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7
