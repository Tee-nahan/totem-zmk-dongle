# Dongle (central) configuration
# Split BLE: 2 peripherals (left + right)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Fetch battery levels from peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_IDLE_TIMEOUT=60000

# Disable BAS (Battery Service) on dongle since it's USB-powered
CONFIG_BT_BAS=n

# (Optional) Show dongle battery level on display
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=y

# Dongle is USB-powered, never sleep
CONFIG_ZMK_SLEEP=n

# Enable BLE output to host computer (wireless connection)
CONFIG_ZMK_BLE=y

# BT connections: 2 split peripherals + 5 BLE host profiles
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7
