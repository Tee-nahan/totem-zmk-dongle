# Dongle (central) configuration

# Split: 3 peripherals — totem_left, totem_right, AdeptBLE
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=3

# Trackball forwarding from AdeptBLE peripheral
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

# Battery
CONFIG_BT_BAS=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Dongle is USB-powered — never sleep
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=60000

# BLE
CONFIG_ZMK_BLE=y
CONFIG_BT_MAX_CONN=8
CONFIG_BT_MAX_PAIRED=8
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Ignore first trackball events after boot / rest (efogdev driver option)
CONFIG_PMW3610_IGNORE_FIRST_N=12
CONFIG_PMW3610_IGNORE_AFTER_REST=y
